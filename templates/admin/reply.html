{% extends 'admin/adminindex.html' %}
{% block body %}
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Reply Page</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-3">
          <div class="card-header bg-secondary text-white text-center">
            <h4 class="mb-0">Admin Reply</h4>
          </div>
          <div class="card-body p-4">
            <!-- Reply Form Section -->
            <form action="/reply_post/" method="post">
              <div class="mb-3">
                <label for="replyText" class="form-label">Reply</label>
                <textarea id="replyText" name="replyText" class="form-control" rows="5" placeholder="Write your reply here..." required></textarea>
              </div>
              <div class="d-grid">
                <button type="submit" class="btn btn-secondary">Send Reply</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
{% endblock %}
