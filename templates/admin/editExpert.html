{% extends 'admin/adminindex.html' %}
{% block body %}
<html>
    <head>
{#        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">#}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
        <title>Add Expert</title>
    </head>
    <body class="bg-light">
        <div class="container"><div class="card shadow-lg">
            <div class="card-header bg-dark">
                <h4 class="mb-0 text-white">Add Expert</h4>
            </div>
            <div class="card-body">
                <form action="/edit_expert_post/" method="post" enctype="multipart/form-data">{% csrf_token %}
                    <div class="mb-3"><label for="Name" class="form-label" >Name</label><input type="text" class="form-control" name="name" required pattern="[A-Z a-z.]{3,50}" title="char only" value="{{ data.Name }}"></div>
                    <div class="mb-3"><label for="DOB" class="form-label">Date of birth</label><input type="date" class="form-control" name="dob" required max="2005-01-01" value="{{ data.DOB|date:'Y-m-d' }}"></div>
                    <div class="mb-3">
                        <label for="gender" class="form-label d-block">Gender</label>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" {% if data.Gender == 'male' %} checked  {% endif %} id="male" name="gender" value="male" required><label class="form-check-label" for="male" >Male</label></div>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" {% if data.Gender == 'female' %} checked  {% endif %} id="female" name="gender" value="female" required><label class="form-check-label" for="female" >Female</label></div>
                    </div>
                    <div class="mb-3">
                        <img src="{{ data.Photo.url }}" width="200px" height="200px">
                        <label for="Photo" class="form-label" >Photo</label><input  type="file" class="form-control" id="Photo" name="photo"   accept="image/*" value=""></div>
                    <div class="mb-3"><label for="Place" class="form-label" >Place</label><input type="text" class="form-control" name="place" required pattern="[A-Za-z ]{3,50}" title="char only" value="{{ data.Place }}"></div>
                    <div class="mb-3"><label for="Post" class="form-label" >Post</label><input type="text" class="form-control" name="post" required pattern="[A-Za-z ]{3,50}" title="char only" value="{{ data.Post }}"></div>
                    <div class="mb-3"><label for="Pin" class="form-label" >Pin code</label><input type="text" class="form-control" name="pin" required pattern="[0-9]{6}" title="six numbers only" value="{{ data.Pin }}"></div>
                    <div class="mb-3"><label for="Phoe" class="form-label" >Phone number</label><input type="text" class="form-control" name="phone" required pattern="[9876][0-9]{9}" title="ten numbers only and first digit should be 9/8/7/6" value="{{ data.Phone_number }}"></div>
                    <div class="mb-3"><label for="email" class="form-label" >Email</label><input type="text" class="form-control" name="email" required pattern="[a-z0-9_.]{3,25}[@][a-z]{3,15}[.][a-z.]{2,20}" title="Invalid email" value="{{ data.Email }}"></div>
                    <div class="d-grid"><button type="submit" class="btn btn-secondary">Save</button></div>
                </form>
            </div>
        </div></div>
    </body>
</html>
{% endblock %}
