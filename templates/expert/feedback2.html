{% extends 'expert/expertindex.html' %}
{% block body %}
<html>
    <head>
{#        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">#}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="-sha384MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <title>View Feedback</title>
    </head>
    <body>
        <div class="card-header bg-dark">
            <h4 class="mb-0 text-white">Feedback</h4>
        </div>
        <form method="post" action="/expert_feedback_post#aaa">
            {% csrf_token %}
        <table class="table table-bordered table-hover table-light table-striped" border="1">
            <tr>
                <th>Date</th>
                <th colspan="2"><input type="date" name="search" value="{{ name }}" class="form-control bg-light border-0 shadow-sm"></th>
                <th>
                    <button type="submit" class="btn btn-secondary">Search</button>
                </th>
            </tr>
            <tr>
                <th>User</th>
                <th>Feedback</th>
                <th colspan="2">Date</th>
            </tr>
            {% for i in data %}
            <tr>
               <td>{{ i.User.Name }}</td>
               <td>{{ i.Feedback }}</td>
               <td colspan="2">{{ i.Date }}</td>
            </tr>
            {% endfor %}
        </table>
            </form>
    </body>
</html>
{% endblock %}
