{% extends 'expert/expertindex.html' %}
{% block body %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
{#    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">#}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="-sha384MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

    <title>Manage Tips</title>
</head>
<body>
    <div class="card-header bg-dark">
        <h4 class="mb-0 text-white">Manage Tips</h4>
    </div>
    {% for message in  messages %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
                {% endfor %}
    <form method="post" action="/manage_tips_post#aaa">
    {% csrf_token %}
    <table class="table table-bordered table-hover table-light table-striped" border="1">
        <tr>
            <th colspan="3"><input type="search" name="search" value="{{ name }}" class="form-control bg-light border-0 shadow-sm"></th>
{#            <th>#}
{#                <button type="submit" class="btn btn-secondary">Search</button>#}
{#            </th>#}
            <th><a href="/insert_tips_get#aaa"><button type="button" class="btn btn-secondary">Add New</button></a></th>
        </tr>
        <tr>
            <th>Tip</th>
            <th>Details</th>
            <th>Date</th>
            <th></th>
        </tr>
        {% for i in tips %}
        <tr>
            <td>{{ i.Tip }}</td>
            <td>{{ i.Details }}</td>
            <td>{{ i.Date }}</td>
            <td><a href="/edit_tips/{{ i.id }}#aaa" class="btn btn-info">Edit</a><br><a href="/delete_tips/{{ i.id }}" class="btn btn-danger">Delete</a></td>
        </tr>
        {% endfor %}
    </table>
    </form>
</body>
</html>
{% endblock %}
