{% extends 'expert/expertindex.html' %}
{% block body %}
<html>
    <head>
{#        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">#}
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="-sha384MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
        <title>Add Suggesstions</title> 
    </head>
    <body>
        <div class="container"><div class="card shadow-lg">
            <div class="card-header bg-dark">
                <h4 class="mb-0 text-white">Add Suggestions</h4>
            </div>

            <div class="card-body">
                <form action="/add_suggestions_post/" method="post">
                    {% csrf_token %}
                    <div class="mb-3"><label class="form-label" for="Details" class="form-label" >Suggesstions</label><textarea class="form-control" name="suggestions" required></textarea></div>
                    <div class="d-grid"><button type="submit" class="btn btn-secondary">Add</button></div>
                </form>
            </div>
        </div></div>
        {% for message in  messages %}
<div class="alert alert-success alert-dismissible fade show" role="alert">
  {{ message }}
  <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
                {% endfor %}
    </body>
</html>
{% endblock %}
